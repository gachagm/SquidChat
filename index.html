<!DOCTYPE html>
<html>
<head>
  <title>SquidChat 🦑</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
  <h1>🦑 SquidChat</h1>
  <nav>
    <a href="connect.html">connect</a>
    <a href="rules.html">rules</a>
  </nav>
</header>

<div class="main">

  <div class="rooms">
    <button onclick="switchRoom('lobby')">lobby</button>
    <button onclick="switchRoom('ranked')">ranked</button>
    <button onclick="switchRoom('fashion')">fashion</button>
    <button onclick="switchRoom('splatfest')">splatfest</button>
  </div>

  <div class="chat">

    <div id="chat"></div>

    <div class="input">
      <input id="username" placeholder="Inkling Name">
      <input id="msg" placeholder="Message...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script type="module" src="firebase.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
