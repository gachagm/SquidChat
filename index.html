<!DOCTYPE html>
<html>
<head>
  <title>SquidChat 🦑</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-animation"></div>

<header>
  <h1>🦑 SQUIDCHAT</h1>
  <nav>
    <a href="connect.html">connect</a>
    <a href="rules.html">rules</a>
  </nav>
</header>

<div class="main">

  <aside class="rooms">
    <button onclick="switchRoom('lobby')">Lobby</button>
    <button onclick="switchRoom('ranked')">Ranked</button>
    <button onclick="switchRoom('fashion')">Fashion</button>
    <button onclick="switchRoom('splatfest')">Splatfest</button>
  </aside>

  <section class="chat">

    <div id="chat"></div>

    <div class="input">
      <input id="username" placeholder="Inkling Name">
      <input id="msg" placeholder="Say something...">
      <button onclick="send()">➤</button>
    </div>

  </section>

</div>

<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>

</body>
</html>
